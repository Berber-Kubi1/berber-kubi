<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Berber Kubi - Randevu Al</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--primary-black:#0a0a0a;--secondary-black:#1a1a1a;--accent-gold:#d4af37;--accent-amber:#ffbf00;--text-primary:#fff;--text-secondary:#b8b8b8;--success-green:#2ecc71;--border-color:#333}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Montserrat,sans-serif;background:var(--primary-black);color:var(--text-primary);line-height:1.6;overflow-x:hidden}.bg-pattern{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 50%,rgba(212,175,55,.03) 0,transparent 50%),radial-gradient(circle at 80% 80%,rgba(255,191,0,.02) 0,transparent 50%);pointer-events:none;z-index:0}.container{max-width:1400px;margin:0 auto;padding:0 20px;position:relative;z-index:1}header{padding:30px 0;border-bottom:1px solid var(--border-color);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;background:rgba(10,10,10,.95)}.header-content{display:flex;justify-content:space-between;align-items:center}.logo{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--accent-gold);letter-spacing:2px;text-transform:uppercase}.logo span{color:var(--text-primary);font-weight:400}.btn{padding:12px 30px;border:none;border-radius:4px;font-family:Montserrat,sans-serif;font-weight:500;font-size:.95rem;cursor:pointer;transition:all .3s ease;text-transform:uppercase;letter-spacing:1px}.btn-primary{background:linear-gradient(135deg,var(--accent-gold),var(--accent-amber));color:var(--primary-black)}.btn-secondary{background:0 0;border:1px solid var(--accent-gold);color:var(--accent-gold)}.hero{padding:80px 0;text-align:center}.hero h1{font-family:'Playfair Display',serif;font-size:4rem;font-weight:700;margin-bottom:20px;background:linear-gradient(135deg,var(--text-primary),var(--accent-gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.booking-container{display:grid;grid-template-columns:1fr 400px;gap:40px;max-width:1200px;margin:0 auto}.calendar-section{background:var(--secondary-black);border:1px solid var(--border-color);border-radius:12px;padding:40px}.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:30px}.day-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-color);border-radius:8px;cursor:pointer;transition:all .3s ease}.day-cell:hover:not(.disabled):not(.empty){border-color:var(--accent-gold);background:rgba(212,175,55,.1)}.day-cell.selected{background:linear-gradient(135deg,var(--accent-gold),var(--accent-amber));color:var(--primary-black)}.day-cell.disabled{opacity:0.3;cursor:not-allowed}.day-cell.empty{visibility:hidden}.time-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.time-slot{padding:15px;border:1px solid var(--border-color);border-radius:8px;text-align:center;cursor:pointer;transition:all .3s ease}.time-slot.selected{background:var(--accent-gold);color:black}.time-slot.booked{background:#222;color:#555;cursor:not-allowed;opacity:0.6;border-color:transparent;text-decoration:line-through}.booking-form{background:var(--secondary-black);border:1px solid var(--border-color);border-radius:12px;padding:40px;position:sticky;top:120px}.form-group{margin-bottom:25px}.form-group label{display:block;margin-bottom:8px;color:var(--text-secondary);font-size:0.85rem;text-transform:uppercase}.form-group input,.form-group select,.form-group textarea{width:100%;padding:15px;background:var(--primary-black);border:1px solid var(--border-color);border-radius:8px;color:white}.qr-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:2000;align-items:center;justify-content:center}.qr-modal.active{display:flex}.qr-content{background:var(--secondary-black);border:2px solid var(--accent-gold);padding:40px;border-radius:16px;text-align:center;max-width:500px;width:90%}.qr-code-bg{background:white;padding:15px;margin:20px auto;display:inline-block;border-radius:10px}
        @media (max-width:968px){.booking-container{grid-template-columns:1fr}.booking-form{position:static}}
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">Berber <span>Kubi</span></div>
                <button class="btn btn-primary" onclick="scrollToBooking()">Hemen Randevu Al</button>
            </div>
        </div>
    </header>

    <div class="container">
        <section class="booking-section" id="bookingSection">
            <h2 style="text-align:center; margin: 60px 0; font-family:'Playfair Display'; font-size:3rem; color:var(--accent-gold)">Stilini Belirle</h2>
            <div class="booking-container">
                <div class="calendar-section">
                    <div class="calendar-header">
                        <h3 id="currentMonthYear"></h3>
                        <div style="display:flex; gap:10px;">
                            <button onclick="changeMonth(-1)" class="btn btn-secondary">‹</button>
                            <button onclick="changeMonth(1)" class="btn btn-secondary">›</button>
                        </div>
                    </div>
                    <div class="days-grid" id="calendarDays"></div>
                    <h4 style="margin: 40px 0 20px; color:var(--accent-gold); font-family:'Playfair Display'; font-size:1.5rem;">Uygun Saatler</h4>
                    <div class="time-slots" id="timeSlots"></div>
                </div>

                <div class="booking-form">
                    <form id="bookingForm" onsubmit="window.submitBooking(event)">
                        <div class="form-group">
                            <label>Hizmet Tipi</label>
                            <select id="serviceType" required>
                                <option value="Saç Kesimi">Saç Kesimi</option>
                                <option value="Sakal Traşı">Sakal Traşı</option>
                                <option value="Kombo Traş">Kombo (Saç + Sakal)</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Adınız</label><input type="text" id="firstName" required></div>
                        <div class="form-group"><label>Soyadınız</label><input type="text" id="lastName" required></div>
                        <div class="form-group"><label>Telefon</label><input type="tel" id="phone" placeholder="05XX XXX XX XX" required></div>
                        <div class="form-group"><label>Notunuz (Opsiyonel)</label><textarea id="userNote" rows="3" placeholder="Örn: Sadece yanları alalım..."></textarea></div>
                        <button type="submit" class="btn btn-primary" style="width:100%; font-size:1.1rem; padding:18px;">Randevuyu Kesinleştir</button>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <div class="qr-modal" id="qrModal">
        <div class="qr-content">
            <h2 style="color:var(--accent-gold); font-family:'Playfair Display'">Randevun Hazır!</h2>
            <p style="margin:10px 0; color:var(--text-secondary)">Karekodunu dükkanda göstererek giriş yapabilirsin.</p>
            <div class="qr-code-bg" id="qrCode"></div>
            <div id="modalDetails" style="text-align:left; margin-bottom:20px; font-size:0.9rem;"></div>
            <button class="btn btn-primary" style="width:100%" onclick="location.reload()">Kapat</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzWt0GNW3rT-Gc4LotPBTEua84muvyBhw",
            authDomain: "berber-kubi-55.firebaseapp.com",
            projectId: "berber-kubi-55",
            storageBucket: "berber-kubi-55.firebasestorage.app",
            messagingSenderId: "31022460981",
            appId: "1:31022460981:web:816b098b56ebcc377c18bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentDate = new Date(), selectedDate = null, selectedTime = null;
        const timeSlots = ["10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00","18:30","19:00"];

        window.scrollToBooking = () => document.getElementById('bookingSection').scrollIntoView({behavior:'smooth'});

        window.renderCalendar = () => {
            const daysGrid = document.getElementById("calendarDays");
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            document.getElementById("currentMonthYear").textContent = new Intl.DateTimeFormat('tr-TR', {month:'long', year:'numeric'}).format(currentDate);
            daysGrid.innerHTML = "";
            const firstDay = new Date(y, m, 1).getDay();
            const lastDate = new Date(y, m+1, 0).getDate();
            const offset = firstDay === 0 ? 6 : firstDay - 1;
            for(let i=0; i<offset; i++) daysGrid.innerHTML += `<div class="day-cell empty"></div>`;
            for(let i=1; i<=lastDate; i++){
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const isPast = new Date(y, m, i) < new Date().setHours(0,0,0,0);
                daysGrid.innerHTML += `<div class="day-cell ${selectedDate===dStr?'selected':''} ${isPast?'disabled':''}" onclick="${isPast?'':'selectDate(\''+dStr+'\')'}">${i}</div>`;
            }
        };

        window.selectDate = (date) => { selectedDate = date; selectedTime = null; renderCalendar(); renderTimeSlots(); };
        window.changeMonth = (v) => { currentDate.setMonth(currentDate.getMonth()+v); renderCalendar(); };

        window.renderTimeSlots = async () => {
            const container = document.getElementById("timeSlots");
            container.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>Saatler yükleniyor...</p>";
            if(!selectedDate) return container.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>Lütfen önce takvimden tarih seçin.</p>";

            const q = query(collection(db, "appointments"), where("date", "==", selectedDate));
            const snap = await getDocs(q);
            const booked = []; snap.forEach(doc => booked.push(doc.data().time));

            container.innerHTML = "";
            timeSlots.forEach(t => {
                const isBooked = booked.includes(t);
                const slot = document.createElement("div");
                slot.className = `time-slot ${isBooked ? 'booked' : ''} ${selectedTime===t?'selected':''}`;
                slot.textContent = isBooked ? t + " (DOLU)" : t;
                if(!isBooked) slot.onclick = () => { selectedTime = t; renderTimeSlots(); };
                container.appendChild(slot);
            });
        };

        window.submitBooking = async (e) => {
            e.preventDefault();
            if(!selectedDate || !selectedTime) return alert("Lütfen tarih ve saat seçin!");
            const docData = {
                firstName: document.getElementById("firstName").value,
                lastName: document.getElementById("lastName").value,
                phone: document.getElementById("phone").value,
                note: document.getElementById("userNote").value,
                service: document.getElementById("serviceType").value,
                date: selectedDate,
                time: selectedTime,
                status: "pending",
                createdAt: serverTimestamp()
            };
            try {
                await addDoc(collection(db, "appointments"), docData);
                document.getElementById("qrModal").classList.add("active");
                QRCode.toCanvas(document.getElementById("qrCode"), JSON.stringify({berber:"Kubi", t:selectedTime, d:selectedDate}), {width:200});
                document.getElementById("modalDetails").innerHTML = `<p><strong>Ad Soyad:</strong> ${docData.firstName} ${docData.lastName}</p><p><strong>Tarih/Saat:</strong> ${selectedDate.split('-').reverse().join('.')} - ${selectedTime}</p>`;
            } catch(e) { alert("Hata oluştu, tekrar deneyin!"); }
        };

        window.selectDate = (date) => { selectedDate = date; selectedTime = null; renderCalendar(); renderTimeSlots(); };
        renderCalendar();
    </script>
</body>
</html>
