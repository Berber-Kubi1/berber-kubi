<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berber Kubi - Yönetim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-black: #0a0a0a; --secondary-black: #1a1a1a; --accent-gold: #d4af37; --accent-amber: #ffbf00; --text-primary: #ffffff; --text-secondary: #b8b8b8; --success-green: #2ecc71; --error-red: #e74c3c; --border-color: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--primary-black); color: var(--text-primary); line-height: 1.6; overflow-x: hidden; }
        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255, 191, 0, 0.02) 0%, transparent 50%); pointer-events: none; z-index: 0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--primary-black); }
        .login-box { background: var(--secondary-black); border: 1px solid var(--border-color); border-radius: 15px; padding: 50px; max-width: 450px; width: 100%; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-top: 4px solid var(--accent-gold); animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .login-box h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--accent-gold); margin-bottom: 15px; letter-spacing: 2px; }
        .login-box p { color: var(--text-secondary); margin-bottom: 30px; font-size: 0.9rem; }
        .form-group { margin-bottom: 25px; text-align: left; }
        .form-group label { display: block; margin-bottom: 10px; color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input { width: 100%; padding: 15px; background: var(--primary-black); border: 1px solid var(--border-color); border-radius: 8px; color: white; font-size: 1rem; transition: 0.3s; }
        .form-group input:focus { border-color: var(--accent-gold); outline: none; box-shadow: 0 0 10px rgba(212,175,55,0.2); }
        .admin-content { display: none; }
        .admin-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-color); margin-bottom: 30px; }
        header h2 { font-family: 'Playfair Display'; color: var(--accent-gold); font-size: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 40px 0; }
        .stat-card { background: var(--secondary-black); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; text-align: center; transition: 0.3s; position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--accent-gold), var(--accent-amber)); transform: scaleX(0); transition: 0.3s; }
        .stat-card:hover { border-color: var(--accent-gold); transform: translateY(-5px); }
        .stat-card:hover::before { transform: scaleX(1); }
        .stat-card p { color: var(--text-secondary); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 10px; }
        .stat-card .number { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--accent-gold); font-weight: 700; }
        .filters { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { padding: 10px 20px; background: var(--secondary-black); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 6px; cursor: pointer; transition: 0.3s; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .filter-btn:hover, .filter-btn.active { border-color: var(--accent-gold); background: rgba(212, 175, 55, 0.1); color: var(--accent-gold); }
        .table-container { background: var(--secondary-black); border: 1px solid var(--border-color); border-radius: 12px; overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 20px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--accent-gold); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; background: rgba(255,255,255,0.02); }
        tbody tr { transition: 0.2s; }
        tbody tr:hover { background: rgba(212, 175, 55, 0.05); }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .btn-gold { background: linear-gradient(135deg, var(--accent-gold), var(--accent-amber)); color: var(--primary-black); }
        .btn-success { background: rgba(46, 204, 113, 0.2); color: var(--success-green); border: 1px solid var(--success-green); margin-right: 5px; }
        .btn-danger { background: rgba(231, 76, 60, 0.2); color: var(--error-red); border: 1px solid var(--error-red); }
        .btn-call { background: rgba(212, 175, 55, 0.2); color: var(--accent-gold); border: 1px solid var(--accent-gold); margin-right: 5px; }
        .btn:hover { transform: scale(1.05); }
        .status-badge { padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .status-pending { background: rgba(255, 191, 0, 0.1); color: var(--accent-amber); border: 1px solid var(--accent-amber); }
        .status-confirmed { background: rgba(46, 204, 113, 0.1); color: var(--success-green); border: 1px solid var(--success-green); }
        .gallery-upload { background: var(--secondary-black); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); }
        .upload-controls { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .upload-controls input[type="text"] { flex: 1; padding: 15px; background: var(--primary-black); border: 1px solid var(--border-color); color: white; border-radius: 8px; min-width: 250px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 25px; }
        .gallery-item { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); transition: 0.3s; background: var(--primary-black); }
        .gallery-item:hover { border-color: var(--accent-gold); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2); }
        .gallery-item img { width: 100%; height: 200px; object-fit: cover; }
        .gallery-item-info { padding: 15px; text-align: center; }
        .gallery-item-info p { color: var(--accent-gold); font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; }
        .gallery-item-info small { color: var(--text-secondary); font-size: 0.75rem; }
        .delete-img { position: absolute; top: 10px; right: 10px; background: var(--error-red); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .delete-img:hover { transform: scale(1.1); background: #c0392b; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.3; }
        @media (max-width: 968px) {
            .stats-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
            header { flex-direction: column; gap: 20px; text-align: center; }
            .upload-controls { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>✂️ KUBİ ADMIN</h1>
            <p>Lütfen yetkili girişi yapınız</p>
            <form onsubmit="window.login(event)">
                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="username" placeholder="Admin kullanıcı adı" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-gold" style="width:100%; padding: 18px;">Giriş Yap</button>
            </form>
        </div>
    </div>
    <div class="admin-content" id="adminContent">
        <div class="container">
            <header>
                <h2>📊 Randevu Paneli</h2>
                <button class="btn btn-danger" onclick="location.reload()">Güvenli Çıkış</button>
            </header>
            <div class="stats-grid">
                <div class="stat-card"><p>Toplam Randevu</p><div class="number" id="totalCount">0</div></div>
                <div class="stat-card"><p>Bekleyenler</p><div class="number" id="pendingCount">0</div></div>
                <div class="stat-card"><p>Bugün</p><div class="number" id="todayCount">0</div></div>
            </div>
            <div class="filters">
                <button class="filter-btn active" onclick="filterAppointments('all')">Tümü</button>
                <button class="filter-btn" onclick="filterAppointments('today')">Bugün</button>
                <button class="filter-btn" onclick="filterAppointments('upcoming')">Gelecek</button>
                <button class="filter-btn" onclick="filterAppointments('pending')">Bekleyen</button>
                <button class="filter-btn" onclick="filterAppointments('confirmed')">Onaylı</button>
            </div>
            <div class="table-container">
                <table><thead><tr><th>Tarih</th><th>Saat</th><th>Müşteri / Telefon</th><th>Hizmet</th><th>Durum</th><th>İşlemler</th></tr></thead><tbody id="appointmentsTable"></tbody></table>
                <div class="empty-state" id="emptyState" style="display: none;"><div class="empty-state-icon">📅</div><h3>Henüz randevu yok</h3><p>Randevular buraya gelecek</p></div>
            </div>
            <h2 style="margin: 60px 0 20px; font-family:'Playfair Display'; color:var(--accent-gold); font-size: 1.8rem;">✂️ Galeri ve Stil Yönetimi</h2>
            <div class="gallery-upload">
                <div class="upload-controls">
                    <input type="text" id="styleTitle" placeholder="Stil Adı (Örn: Amerikan Tıraş)">
                    <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="window.uploadImage(event)">
                    <button class="btn btn-gold" onclick="document.getElementById('imageUpload').click()">📸 Yeni Fotoğraf Ekle</button>
                </div>
                <div class="gallery-grid" id="galleryGrid"></div>
            </div>
        </div>
    </div>
    <audio id="notificationSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {apiKey: "AIzaSyBzWt0GNW3rT-Gc4LotPBTEua84muvyBhw",authDomain: "berber-kubi-55.firebaseapp.com",projectId: "berber-kubi-55",storageBucket: "berber-kubi-55.firebasestorage.app",messagingSenderId: "31022460981",appId: "1:31022460981:web:816b098b56ebcc377c18bc"};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allAppointments = [];
        let currentFilter = 'all';
        if (Notification.permission !== "granted") { Notification.requestPermission(); }
        window.notifyMe = (name) => {
            const audio = document.getElementById('notificationSound');
            audio.play().catch(e => console.log("Ses izni gerekli"));
            if (Notification.permission === "granted") {
                new Notification("✂️ Yeni Randevu!", { body: name + " randevu aldı.", icon: "https://cdn-icons-png.flaticon.com/512/80/80613.png" });
            }
        };
        window.login = (e) => {
            e.preventDefault();
            if(document.getElementById('username').value === 'kubi' && document.getElementById('password').value === '123') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').classList.add('active');
                startApp();
            } else { alert("❌ Hatalı Kullanıcı Adı veya Şifre!"); }
        };
        function startApp() {
            onSnapshot(query(collection(db, "appointments"), orderBy("createdAt", "desc")), (snapshot) => {
                allAppointments = [];
                let t = 0, p = 0, td = 0;
                const todayStr = new Date().toISOString().split('T')[0];
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const d = change.doc.data();
                        const now = new Date().getTime();
                        const createdAt = d.createdAt?.toDate ? d.createdAt.toDate().getTime() : now;
                        if (now - createdAt < 15000) { notifyMe(d.firstName); }
                    }
                });
                snapshot.forEach(docSnap => {
                    const data = { id: docSnap.id, ...docSnap.data() };
                    allAppointments.push(data);
                    t++; if(data.status === 'pending') p++; if(data.date === todayStr) td++;
                });
                document.getElementById('totalCount').textContent = t;
                document.getElementById('pendingCount').textContent = p;
                document.getElementById('todayCount').textContent = td;
                renderAppointments();
            });
            onSnapshot(collection(db, "gallery"), (snapshot) => {
                const grid = document.getElementById("galleryGrid");
                grid.innerHTML = "";
                if (snapshot.empty) {
                    grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><div class="empty-state-icon">📸</div><h3>Henüz fotoğraf yok</h3><p>Yeni stil fotoğrafları ekleyin</p></div>';
                    return;
                }
                snapshot.forEach(d => {
                    const data = d.data();
                    const createdDate = data.createdAt?.toDate ? data.createdAt.toDate().toLocaleDateString('tr-TR') : 'Bilinmiyor';
                    grid.innerHTML += `<div class="gallery-item"><img src="${data.url}" alt="${data.styleName}"><div class="gallery-item-info"><p>${data.styleName}</p><small>${createdDate}</small></div><button class="delete-img" onclick="window.deleteDocData('${d.id}', 'gallery')" title="Sil">✕</button></div>`;
                });
            });
        }
        window.filterAppointments = (filter) => {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderAppointments();
        };
        function renderAppointments() {
            const tbody = document.getElementById("appointmentsTable");
            const emptyState = document.getElementById("emptyState");
            tbody.innerHTML = "";
            let filtered = [...allAppointments];
            const todayStr = new Date().toISOString().split('T')[0];
            if (currentFilter === 'today') {
                filtered = filtered.filter(a => a.date === todayStr);
            } else if (currentFilter === 'upcoming') {
                filtered = filtered.filter(a => new Date(a.date) >= new Date(todayStr));
            } else if (currentFilter === 'pending') {
                filtered = filtered.filter(a => a.status === 'pending');
            } else if (currentFilter === 'confirmed') {
                filtered = filtered.filter(a => a.status === 'confirmed');
            }
            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';
            filtered.forEach(data => {
                const dateFormatted = data.date.split('-').reverse().join('.');
                const statusText = data.status === 'pending' ? 'BEKLİYOR' : 'ONAYLANDI';
                tbody.innerHTML += `<tr><td>${dateFormatted}</td><td><strong style="color:var(--accent-gold)">${data.time}</strong></td><td>${data.firstName} ${data.lastName}<br><small style="color:var(--text-secondary)">${data.phone}</small>${data.inspirationStyle ? `<br><small style="color:var(--accent-amber)">🎨 ${data.inspirationStyle}</small>` : ''}</td><td>${data.service}</td><td><span class="status-badge status-${data.status}">${statusText}</span></td><td><div style="display:flex; gap:5px; flex-wrap:wrap;">${data.status === 'pending' ? `<button class="btn btn-success" onclick="window.updateStatus('${data.id}', 'confirmed')">✓ Onayla</button>` : ''}<button class="btn btn-call" onclick="window.callCustomer('${data.phone}')">📞 Ara</button><button class="btn btn-danger" onclick="window.deleteDocData('${data.id}', 'appointments')">✕ Sil</button></div></td></tr>`;
            });
        }
        window.updateStatus = async (id, status) => { await updateDoc(doc(db, "appointments", id), { status }); };
        window.callCustomer = (phone) => {
            if(confirm(`${phone} numarasını aramak için telefon uygulamanız açılacak.`)) {
                window.location.href = `tel:${phone}`;
            }
        };
        window.deleteDocData = async (id, col) => { if(confirm("Bu veriyi silmek istediğinize emin misiniz?")) { await deleteDoc(doc(db, col, id)); }};
        window.uploadImage = async (e) => {
            const file = e.target.files[0];
            const title = document.getElementById('styleTitle').value.trim();
            if(!file) return;
            if(!title) { alert("⚠️ Lütfen stil adı girin!"); return; }
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    await addDoc(collection(db, "gallery"), { url: ev.target.result, styleName: title, createdAt: new Date() });
                    document.getElementById('styleTitle').value = "";
                    document.getElementById('imageUpload').value = "";
                    alert("✅ Fotoğraf başarıyla yüklendi!");
                } catch (error) {
                    console.error("Hata:", error);
                    alert("❌ Fotoğraf yüklenirken hata oluştu!");
                }
            };
            reader.readAsDataURL(file);
        };
    </script>
</body>
</html>
