<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berber Kubi - Yönetim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-black: #0a0a0a; --secondary-black: #1a1a1a; --accent-gold: #d4af37; --accent-amber: #ffbf00; --text-primary: #ffffff; --text-secondary: #b8b8b8; --success-green: #2ecc71; --error-red: #e74c3c; --border-color: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--primary-black); color: var(--text-primary); line-height: 1.6; }
        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255, 191, 0, 0.02) 0%, transparent 50%); pointer-events: none; z-index: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        
        /* Giriş Ekranı */
        .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--secondary-black); border: 1px solid var(--border-color); border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box h1 { font-family: 'Playfair Display', serif; color: var(--accent-gold); margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 12px; background: var(--primary-black); border: 1px solid var(--border-color); border-radius: 6px; color: white; }
        
        .admin-content { display: none; padding-top: 20px; }
        .admin-content.active { display: block; }

        /* İstatistikler */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--secondary-black); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-card .number { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--accent-gold); }

        /* Tablo Tasarımı */
        .table-container { background: var(--secondary-black); border: 1px solid var(--border-color); border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--accent-gold); font-size: 0.8rem; text-transform: uppercase; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; transition: 0.3s; text-transform: uppercase; font-size: 0.75rem; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-gold), var(--accent-amber)); color: var(--primary-black); }
        .btn-success { background: var(--success-green); color: white; margin-right: 5px; }
        .btn-danger { background: var(--error-red); color: white; }
        
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .status-pending { background: rgba(255, 191, 0, 0.2); color: var(--accent-amber); }
        .status-confirmed { background: rgba(46, 204, 113, 0.2); color: var(--success-green); }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-item { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
        .gallery-item img { width: 100%; height: 150px; object-fit: cover; }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>Admin Panel</h1>
            <form onsubmit="window.login(event)">
                <div class="form-group"><label>Kullanıcı Adı</label><input type="text" id="username" required></div>
                <div class="form-group"><label>Şifre</label><input type="password" id="password" required></div>
                <button type="submit" class="btn btn-primary" style="width:100%">Giriş Yap</button>
            </form>
        </div>
    </div>

    <div class="admin-content" id="adminContent">
        <div class="container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 style="font-family:'Playfair Display'; color:var(--accent-gold)">✂️ Randevu Yönetimi</h2>
                <button class="btn btn-danger" onclick="location.reload()">Güvenli Çıkış</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><p>Toplam</p><div class="number" id="totalCount">0</div></div>
                <div class="stat-card"><p>Bekleyen</p><div class="number" id="pendingCount">0</div></div>
                <div class="stat-card"><p>Bugün</p><div class="number" id="todayCount">0</div></div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Tarih</th><th>Saat</th><th>Müşteri / Tel</th><th>Hizmet</th><th>Durum</th><th>İşlemler</th></tr>
                    </thead>
                    <tbody id="appointmentsTable"></tbody>
                </table>
            </div>

            <h2 style="margin: 40px 0 20px; font-family:'Playfair Display'; color:var(--accent-gold)">📸 Galeri Yönetimi</h2>
            <div style="background:var(--secondary-black); padding:20px; border-radius:12px; border:1px solid var(--border-color);">
                <input type="text" id="styleTitle" placeholder="Traş Stili Adı" style="padding:10px; background:black; border:1px solid var(--border-color); color:white; border-radius:5px; margin-right:10px;">
                <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="window.uploadImage(event)">
                <button class="btn btn-primary" onclick="document.getElementById('imageUpload').click()">Fotoğraf Yükle</button>
                <div class="gallery-grid" id="galleryGrid"></div>
            </div>
        </div>
    </div>

    <audio id="notificationSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzWt0GNW3rT-Gc4LotPBTEua84muvyBhw",
            authDomain: "berber-kubi-55.firebaseapp.com",
            projectId: "berber-kubi-55",
            storageBucket: "berber-kubi-55.firebasestorage.app",
            messagingSenderId: "31022460981",
            appId: "1:31022460981:web:816b098b56ebcc377c18bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- BİLDİRİM SİSTEMİ ---
        if (Notification.permission !== "granted") { Notification.requestPermission(); }

        window.notifyMe = (name) => {
            document.getElementById('notificationSound').play();
            if (Notification.permission === "granted") {
                new Notification("✂️ Yeni Randevu!", { body: name + " randevu aldı.", icon: "https://cdn-icons-png.flaticon.com/512/80/80613.png" });
            }
        };

        // GİRİŞ
        window.login = (e) => {
            e.preventDefault();
            if(document.getElementById('username').value === 'kubi' && document.getElementById('password').value === '123') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').classList.add('active');
                startApp();
            } else { alert("Hatalı Giriş!"); }
        };

        function startApp() {
            // Randevuları Dinle
            onSnapshot(query(collection(db, "appointments"), orderBy("createdAt", "desc")), (snapshot) => {
                const tbody = document.getElementById("appointmentsTable");
                tbody.innerHTML = "";
                let t = 0, p = 0, td = 0;
                const today = new Date().toISOString().split('T')[0];

                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const d = change.doc.data();
                        const now = new Date().getTime();
                        const createdAt = d.createdAt?.toDate ? d.createdAt.toDate().getTime() : now;
                        if (now - createdAt < 15000) notifyMe(d.firstName); // Son 15 saniyede eklenenler için çal
                    }
                });

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    t++; if(data.status === 'pending') p++; if(data.date === today) td++;

                    tbody.innerHTML += `
                        <tr>
                            <td>${data.date.split('-').reverse().join('.')}</td>
                            <td><strong>${data.time}</strong></td>
                            <td>${data.firstName} ${data.lastName}<br><small>${data.phone}</small></td>
                            <td>${data.service}</td>
                            <td><span class="status-badge status-${data.status}">${data.status === 'pending' ? 'Bekliyor' : 'Onaylı'}</span></td>
                            <td>
                                ${data.status === 'pending' ? `<button class="btn btn-success" onclick="window.updateStatus('${id}', 'confirmed')">Onayla</button>` : ''}
                                <button class="btn btn-danger" onclick="window.deleteDocData('${id}', 'appointments')">Sil</button>
                            </td>
                        </tr>`;
                });
                document.getElementById('totalCount').textContent = t;
                document.getElementById('pendingCount').textContent = p;
                document.getElementById('todayCount').textContent = td;
            });

            // Galeriyi Dinle
            onSnapshot(collection(db, "gallery"), (snapshot) => {
                const grid = document.getElementById("galleryGrid");
                grid.innerHTML = "";
                snapshot.forEach(d => {
                    grid.innerHTML += `<div class="gallery-item"><img src="${d.data().url}"><button onclick="window.deleteDocData('${d.id}', 'gallery')" style="position:absolute;top:0;right:0;background:red;color:white;border:none;cursor:pointer">X</button></div>`;
                });
            });
        }

        window.updateStatus = async (id, s) => { await updateDoc(doc(db, "appointments", id), { status: s }); };
        window.deleteDocData = async (id, col) => { if(confirm("Silmek istediğine emin misin?")) await deleteDoc(doc(db, col, id)); };

        window.uploadImage = async (e) => {
            const file = e.target.files[0];
            const title = document.getElementById('styleTitle').value || "Yeni Stil";
            const reader = new FileReader();
            reader.onload = async (ev) => {
                await addDoc(collection(db, "gallery"), { url: ev.target.result, styleName: title, createdAt: new Date() });
                alert("Fotoğraf yüklendi!");
            };
            reader.readAsDataURL(file);
        };
    </script>
</body>
</html>
