<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berber Kubi - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-black: #0a0a0a;
            --secondary-black: #1a1a1a;
            --accent-gold: #d4af37;
            --accent-amber: #ffbf00;
            --text-primary: #ffffff;
            --text-secondary: #b8b8b8;
            --success-green: #2ecc71;
            --error-red: #e74c3c;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--primary-black);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 191, 0, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: var(--secondary-black);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 50px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--accent-gold);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: var(--primary-black);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-amber));
            color: var(--primary-black);
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .error-msg {
            color: var(--error-red);
            margin-top: 15px;
            display: none;
        }

        .admin-content {
            display: none;
        }

        .admin-content.active {
            display: block;
        }

        header {
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--error-red);
            color: var(--error-red);
            padding: 10px 25px;
        }

        .logout-btn:hover {
            background: var(--error-red);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--secondary-black);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-5px);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--accent-gold);
            font-weight: 700;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .filter-btn {
            padding: 10px 20px;
            background: var(--secondary-black);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent-gold);
        }

        .table-container {
            background: var(--secondary-black);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        thead {
            background: var(--primary-black);
        }

        th {
            padding: 20px;
            text-align: left;
            font-weight: 600;
            color: var(--accent-gold);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        td {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        tbody tr {
            transition: background 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(212, 175, 55, 0.05);
        }

        .status-badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending {
            background: rgba(255, 191, 0, 0.2);
            color: var(--accent-amber);
        }

        .status-confirmed {
            background: rgba(46, 204, 113, 0.2);
            color: var(--success-green);
        }

        .status-cancelled {
            background: rgba(231, 76, 60, 0.2);
            color: var(--error-red);
        }

        .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-confirm { background: var(--success-green); color: white; }
        .btn-call { background: var(--accent-gold); color: var(--primary-black); }
        .btn-cancel { background: var(--error-red); color: white; }

        .action-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .gallery-item { position: relative; background: var(--secondary-black); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
        .gallery-item img { width: 100%; height: 200px; object-fit: cover; }
        
        /* MOBİL TABLET DOKUNUŞLARI */
        @media (max-width: 640px) {
            .logo { font-size: 1.2rem; }
            .stat-card .number { font-size: 2rem; }
            th, td { padding: 12px; font-size: 0.8rem; }
            .login-box { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>Admin Panel</h1>
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Giriş Yap</button>
                <p class="error-msg" id="errorMsg">Hatalı giriş!</p>
            </form>
        </div>
    </div>

    <div class="admin-content" id="adminContent">
        <div class="container">
            <header>
                <div class="header-content">
                    <div class="logo">BERBER KUBİ</div>
                    <button class="btn logout-btn" onclick="logout()">Çıkış</button>
                </div>
            </header>
            <div class="stats-grid">
                <div class="stat-card"><h3>Bugün</h3><div class="number" id="todayCount">0</div></div>
                <div class="stat-card"><h3>Hafta</h3><div class="number" id="weekCount">0</div></div>
                <div class="stat-card"><h3>Ay</h3><div class="number" id="monthCount">0</div></div>
                <div class="stat-card"><h3>Toplam</h3><div class="number" id="totalCount">0</div></div>
            </div>
            <h2 class="section-title">Randevular</h2>
            <div class="filters">
                <button class="filter-btn active" onclick="filterAppointments('all')">Tümü</button>
                <button class="filter-btn" onclick="filterAppointments('today')">Bugün</button>
                <button class="filter-btn" onclick="filterAppointments('upcoming')">Gelecek</button>
                <button class="filter-btn" onclick="filterAppointments('pending')">Bekleyen</button>
                <button class="filter-btn" onclick="filterAppointments('confirmed')">Onaylı</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Tarih</th><th>Saat</th><th>Müşteri</th><th>Telefon</th><th>Hizmet</th><th>Durum</th><th>İşlemler</th></tr>
                    </thead>
                    <tbody id="appointmentsTable"></tbody>
                </table>
                <div class="empty-state" id="emptyState" style="display: none;"><h3>Randevu yok</h3></div>
            </div>
            <h2 class="section-title" style="margin-top: 40px;">Galeri Yönetimi</h2>
            <div class="upload-box" style="text-align: center; padding: 30px; border: 2px dashed #333; margin-bottom: 20px;">
                <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="uploadImage(event)">
                <input type="text" id="styleTitle" placeholder="Traş Stili Adı: "
                    style="width: 100%; padding: 12px; margin-bottom: 15px; background: var(--primary-black); border: 1px solid var(--border-color); color: white; border-radius: 8px;"
                <button class="btn btn-primary" onclick="document.getElementById('imageUpload').click()">📸 Foto Ekle</button>
            </div>
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </div>

    <script>
        const ADMIN_USERNAME = 'kubi';
        const ADMIN_PASSWORD = '123';
        let appointments = [];
        let currentFilter = 'all';
        let gallery = [];

        function login(e) {
            e.preventDefault();
            if (document.getElementById('username').value === ADMIN_USERNAME && document.getElementById('password').value === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').classList.add('active');
                loadAppointments(); loadGallery();
            } else { document.getElementById('errorMsg').style.display = 'block'; }
        }

        function loadGallery() { gallery = JSON.parse(localStorage.getItem('berberKubiGallery')) || []; renderGallery(); }
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = gallery.map((img, index) => `
                <div class="gallery-item" style="text-align:center; padding-bottom:10px;">
                    <img src="${img.url}">
                    <p style="color:var(--accent-gold); font-size:0.9rem; margin-top:5px; font-weight:600;">
                        ${img.styleName || 'İsimsiz Stil'}
                    </p>
                    <button onclick="deleteImage(${index})" style="position:absolute;top:5px;right:5px;background:red;color:white;border:none;border-radius:50%;width:25px;height:25px;cursor:pointer">✕</button>
                </div>`).join('');
        }

        function uploadImage(event) {
            const file = event.target.files[0]; 
            const styleTitle = document.getElementById('styleTitle').value; // Yazıyı al
    
            if (!file) return;
            if (!styleTitle) { alert("Lütfen önce traş stilinin adını yazın!"); return; }

            const reader = new FileReader();
            reader.onload = (e) => {
                gallery.push({ 
                    id: Date.now(), 
                    url: e.target.result,
                    styleName: styleTitle // Yazıyı objeye ekle
                });
                localStorage.setItem('berberKubiGallery', JSON.stringify(gallery)); 
                document.getElementById('styleTitle').value = ''; // Kutuyu temizle
                renderGallery();
            }; 
            reader.readAsDataURL(file);
        }

        function deleteImage(index) { if (confirm('Silinsin mi?')) { gallery.splice(index, 1); localStorage.setItem('berberKubiGallery', JSON.stringify(gallery)); renderGallery(); } }
        function logout() { location.reload(); }
        function loadAppointments() { appointments = JSON.parse(localStorage.getItem('berberKubiAppointments')) || []; updateStats(); renderAppointments(); }
        function updateStats() {
            const todayStr = new Date().toISOString().split('T')[0];
            document.getElementById('todayCount').textContent = appointments.filter(a => a.date === todayStr).length;
            document.getElementById('totalCount').textContent = appointments.length;
        }

        function filterAppointments(f) { currentFilter = f; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); renderAppointments(); }

        function renderAppointments() {
            const tbody = document.getElementById('appointmentsTable');
            let filtered = [...appointments];
            const todayStr = new Date().toISOString().split('T')[0];

            if (currentFilter === 'today') filtered = filtered.filter(a => a.date === todayStr);
            else if (currentFilter === 'pending') filtered = filtered.filter(a => a.status === 'pending');
            else if (currentFilter === 'confirmed') filtered = filtered.filter(a => a.status === 'confirmed');

            if (filtered.length === 0) { tbody.innerHTML = ''; document.getElementById('emptyState').style.display = 'block'; return; }
            document.getElementById('emptyState').style.display = 'none';
            tbody.innerHTML = filtered.map(apt => `
                <tr>
                    <td>${apt.date}</td>
                    <td><strong>${apt.time}</strong></td>
                    <td>${apt.firstName} ${apt.lastName}</td>
                    <td>${apt.phone}</td>
                    <td>${apt.service}</td>
                    <td><span class="status-badge status-${apt.status}">${apt.status}</span></td>
                    <td>
                        <div class="action-btns">
                            ${apt.status === 'pending' ? `<button class="action-btn btn-confirm" onclick="confirmAppointment(${apt.id})">Onayla</button>` : ''}
                            <button class="action-btn btn-call" onclick="window.location.href='tel:${apt.phone}'">Ara</button>
                            <button class="action-btn btn-cancel" onclick="cancelAppointment(${apt.id})">Sil</button>
                        </div>
                    </td>
                </tr>`).join('');
        }

        function confirmAppointment(id) { 
            const apt = appointments.find(a => a.id === id); 
            if(apt) { apt.status = 'confirmed'; localStorage.setItem('berberKubiAppointments', JSON.stringify(appointments)); loadAppointments(); }
        }

        function cancelAppointment(id) { if(confirm('Silinsin mi?')) { appointments = appointments.filter(a => a.id !== id); localStorage.setItem('berberKubiAppointments', JSON.stringify(appointments)); loadAppointments(); } }
        setInterval(loadAppointments, 30000);
    </script>
</body>
</html>
