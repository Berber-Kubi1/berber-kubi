<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berber Kubi - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-black: #0a0a0a; --secondary-black: #1a1a1a; --accent-gold: #d4af37; --accent-amber: #ffbf00; --text-primary: #ffffff; --text-secondary: #b8b8b8; --success-green: #2ecc71; --error-red: #e74c3c; --border-color: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--primary-black); color: var(--text-primary); line-height: 1.6; }
        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255, 191, 0, 0.02) 0%, transparent 50%); pointer-events: none; z-index: 0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--secondary-black); border: 1px solid var(--border-color); border-radius: 12px; padding: 50px; max-width: 400px; width: 100%; text-align: center; }
        .login-box h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--accent-gold); margin-bottom: 40px; }
        .form-group { margin-bottom: 25px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input { width: 100%; padding: 15px; background: var(--primary-black); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 1rem; }
        .btn { padding: 15px 40px; border: none; border-radius: 4px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-gold), var(--accent-amber)); color: var(--primary-black); width: 100%; }
        .admin-content { display: none; }
        .admin-content.active { display: block; }
        header { padding: 30px 0; border-bottom: 1px solid var(--border-color); margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--accent-gold); font-weight: 700; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--secondary-black); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; text-align: center; }
        .stat-card .number { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--accent-gold); font-weight: 700; }
        .filters { display: flex; gap: 15px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 10px; }
        .filter-btn { padding: 10px 20px; background: var(--secondary-black); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 6px; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(212, 175, 55, 0.1); }
        .table-container { background: var(--secondary-black); border: 1px solid var(--border-color); border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 20px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--accent-gold); text-transform: uppercase; font-size: 0.85rem; }
        .status-badge { padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-pending { background: rgba(255, 191, 0, 0.2); color: var(--accent-amber); }
        .status-confirmed { background: rgba(46, 204, 113, 0.2); color: var(--success-green); }
        .action-btns { display: flex; gap: 8px; }
        .action-btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .gallery-item { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
        .gallery-item img { width: 100%; height: 200px; object-fit: cover; }
        .gallery-item p { padding: 10px; text-align: center; color: var(--accent-gold); font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>Admin Panel</h1>
            <form onsubmit="window.login(event)">
                <div class="form-group"><label>Kullanıcı Adı</label><input type="text" id="username" required></div>
                <div class="form-group"><label>Şifre</label><input type="password" id="password" required></div>
                <button type="submit" class="btn btn-primary">Giriş Yap</button>
                <p id="errorMsg" style="color:var(--error-red); margin-top:15px; display:none;">Hatalı giriş!</p>
            </form>
        </div>
    </div>

    <div class="admin-content" id="adminContent">
        <div class="container">
            <header>
                <div class="logo">BERBER KUBİ</div>
                <button class="btn" style="border:1px solid var(--error-red); color:var(--error-red)" onclick="location.reload()">Çıkış</button>
            </header>
            <div class="stats-grid">
                <div class="stat-card"><h3>Toplam</h3><div class="number" id="totalCount">0</div></div>
                <div class="stat-card"><h3>Bugün</h3><div class="number" id="todayCount">0</div></div>
                <div class="stat-card"><h3>Bekleyen</h3><div class="number" id="pendingCount">0</div></div>
            </div>

            <h2 style="margin-bottom:20px; font-family:'Playfair Display'">Randevular</h2>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Tümü</button>
                <button class="filter-btn" data-filter="today">Bugün</button>
                <button class="filter-btn" data-filter="pending">Bekleyen</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Tarih</th><th>Saat</th><th>Müşteri</th><th>Hizmet</th><th>Not</th><th>Durum</th><th>İşlemler</th></tr>
                    </thead>
                    <tbody id="appointmentsTable"></tbody>
                </table>
            </div>

            <h2 style="margin: 40px 0 20px; font-family:'Playfair Display'">Galeri Yönetimi</h2>
            <div style="background:var(--secondary-black); padding:30px; border-radius:12px; border:1px solid var(--border-color); text-align:center;">
                <input type="text" id="styleTitle" placeholder="Traş Stili Adı" style="width:100%; max-width:400px; padding:12px; background:var(--primary-black); border:1px solid var(--border-color); color:white; border-radius:8px; margin-bottom:15px;"><br>
                <input type="file" id="imageUpload" accept="image/*" style="display:none;" onchange="window.uploadImage(event)">
                <button class="btn btn-primary" style="max-width:400px;" onclick="document.getElementById('imageUpload').click()">📸 Fotoğraf Seç ve Yükle</button>
            </div>
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzWt0GNW3rT-Gc4LotPBTEua84muvyBhw",
            authDomain: "berber-kubi-55.firebaseapp.com",
            projectId: "berber-kubi-55",
            storageBucket: "berber-kubi-55.firebasestorage.app",
            messagingSenderId: "31022460981",
            appId: "1:31022460981:web:816b098b56ebcc377c18bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentFilter = 'all';

        // GİRİŞ FONKSİYONU
        window.login = (e) => {
            e.preventDefault();
            if(document.getElementById('username').value === 'kubi' && document.getElementById('password').value === '123'){
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').classList.add('active');
                startListening();
            } else { document.getElementById('errorMsg').style.display = 'block'; }
        };

        // RANDEVULARI DİNLE
        function startListening() {
            onSnapshot(query(collection(db, "appointments"), orderBy("createdAt", "desc")), (snapshot) => {
                renderTable(snapshot);
                renderStats(snapshot);
            });
            onSnapshot(collection(db, "gallery"), (snapshot) => renderGallery(snapshot));
        }

        function renderTable(snapshot) {
            const tbody = document.getElementById("appointmentsTable");
            const todayStr = new Date().toISOString().split('T')[0];
            tbody.innerHTML = "";

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                
                if(currentFilter === 'today' && data.date !== todayStr) return;
                if(currentFilter === 'pending' && data.status !== 'pending') return;

                tbody.innerHTML += `
                    <tr>
                        <td>${data.date.split('-').reverse().join('.')}</td>
                        <td><strong>${data.time}</strong></td>
                        <td>${data.firstName} ${data.lastName}<br><small>${data.phone}</small></td>
                        <td>${data.service}</td>
                        <td style="font-size:0.8rem; font-style:italic; max-width:200px;">${data.note || '-'}</td>
                        <td><span class="status-badge status-${data.status}">${data.status === 'pending' ? 'Bekliyor' : 'Onaylı'}</span></td>
                        <td>
                            <div class="action-btns">
                                ${data.status === 'pending' ? `<button class="action-btn" style="background:var(--success-green); color:white" onclick="window.updateStatus('${id}', 'confirmed')">Onayla</button>` : ''}
                                <button class="action-btn" style="background:var(--error-red); color:white" onclick="window.deleteDocData('${id}', 'appointments')">Sil</button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        function renderStats(snapshot) {
            let t = 0, p = 0, td = 0;
            const todayStr = new Date().toISOString().split('T')[0];
            snapshot.forEach(d => {
                t++;
                if(d.data().status === 'pending') p++;
                if(d.data().date === todayStr) td++;
            });
            document.getElementById('totalCount').textContent = t;
            document.getElementById('pendingCount').textContent = p;
            document.getElementById('todayCount').textContent = td;
        }

        // GALERİ İŞLEMLERİ
        window.uploadImage = async (event) => {
            const file = event.target.files[0];
            const title = document.getElementById('styleTitle').value;
            if(!file || !title) return alert("Lütfen önce stil adını yazın!");
            const reader = new FileReader();
            reader.onload = async (e) => {
                await addDoc(collection(db, "gallery"), { url: e.target.result, styleName: title, createdAt: new Date() });
                document.getElementById('styleTitle').value = "";
            };
            reader.readAsDataURL(file);
        };

        function renderGallery(snapshot) {
            const grid = document.getElementById("galleryGrid");
            grid.innerHTML = "";
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                grid.innerHTML += `
                    <div class="gallery-item">
                        <img src="${data.url}">
                        <p>${data.styleName}</p>
                        <button onclick="window.deleteDocData('${docSnap.id}', 'gallery')" style="position:absolute; top:5px; right:5px; background:red; color:white; border:none; border-radius:50%; width:25px; height:25px; cursor:pointer">✕</button>
                    </div>`;
            });
        }

        // GLOBAL AKSİYONLAR
        window.updateStatus = async (id, s) => { await updateDoc(doc(db, "appointments", id), { status: s }); };
        window.deleteDocData = async (id, col) => { if(confirm("Emin misiniz?")) await deleteDoc(doc(db, col, id)); };

        // FİLTRELEME
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                // Veriyi yeniden tetiklemek için Firestore'dan tekrar render alıyoruz
            };
        });
    </script>
</body>
</html>
