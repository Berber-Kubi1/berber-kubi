<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berber Kubi - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-black: #0a0a0a;
            --secondary-black: #1a1a1a;
            --accent-gold: #d4af37;
            --accent-amber: #ffbf00;
            --text-primary: #ffffff;
            --text-secondary: #b8b8b8;
            --success-green: #2ecc71;
            --error-red: #e74c3c;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--primary-black);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 191, 0, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: var(--secondary-black);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 50px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--accent-gold);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: var(--primary-black);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-amber));
            color: var(--primary-black);
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .error-msg {
            color: var(--error-red);
            margin-top: 15px;
            display: none;
        }

        .admin-content {
            display: none;
        }

        .admin-content.active {
            display: block;
        }

        header {
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--error-red);
            color: var(--error-red);
            padding: 10px 25px;
        }

        .logout-btn:hover {
            background: var(--error-red);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--secondary-black);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-5px);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--accent-gold);
            font-weight: 700;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: var(--secondary-black);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent-gold);
        }

        .table-container {
            background: var(--secondary-black);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--primary-black);
        }

        th {
            padding: 20px;
            text-align: left;
            font-weight: 600;
            color: var(--accent-gold);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        td {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        tbody tr {
            transition: background 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(212, 175, 55, 0.05);
        }

        .status-badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending {
            background: rgba(255, 191, 0, 0.2);
            color: var(--accent-amber);
        }

        .status-confirmed {
            background: rgba(46, 204, 113, 0.2);
            color: var(--success-green);
        }

        .status-cancelled {
            background: rgba(231, 76, 60, 0.2);
            color: var(--error-red);
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-confirm {
            background: var(--success-green);
            color: white;
        }

        .btn-call {
            background: var(--accent-gold);
            color: var(--primary-black);
        }

        .btn-cancel {
            background: var(--error-red);
            color: white;
        }

        .action-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .gallery-section {
            margin-bottom: 60px;
        }

        .upload-box {
            background: var(--secondary-black);
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .upload-box:hover {
            border-color: var(--accent-gold);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            background: var(--secondary-black);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .gallery-item-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
        }

        .gallery-btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .gallery-btn-delete {
            background: rgba(231, 76, 60, 0.9);
            color: white;
        }

        .gallery-btn-delete:hover {
            background: var(--error-red);
        }

        @media (max-width: 968px) {
            .table-container {
                overflow-x: auto;
            }

            table {
                min-width: 800px;
            }

            .filters {
                justify-content: center;
            }
        }

        @media (max-width: 640px) {
            .login-box {
                padding: 30px 20px;
            }

            .stat-card .number {
                font-size: 2rem;
            }

            .action-btns {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>Admin Panel</h1>
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">Giriş Yap</button>
                <p class="error-msg" id="errorMsg">Kullanıcı adı veya şifre hatalı!</p>
            </form>
        </div>
    </div>

    <!-- Admin Content -->
    <div class="admin-content" id="adminContent">
        <div class="container">
            <header>
                <div class="header-content">
                    <div class="logo">BERBER KUBİ</div>
                    <button class="btn logout-btn" onclick="logout()">Çıkış Yap</button>
                </div>
            </header>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Bugün</h3>
                    <div class="number" id="todayCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>Bu Hafta</h3>
                    <div class="number" id="weekCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>Bu Ay</h3>
                    <div class="number" id="monthCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>Toplam</h3>
                    <div class="number" id="totalCount">0</div>
                </div>
            </div>

            <!-- Filters -->
            <h2 class="section-title">Randevular</h2>
            <div class="filters">
                <button class="filter-btn active" onclick="filterAppointments('all')">Tümü</button>
                <button class="filter-btn" onclick="filterAppointments('today')">Bugün</button>
                <button class="filter-btn" onclick="filterAppointments('upcoming')">Gelecek</button>
                <button class="filter-btn" onclick="filterAppointments('pending')">Bekleyen</button>
                <button class="filter-btn" onclick="filterAppointments('confirmed')">Onaylı</button>
            </div>

            <!-- Gallery Management -->
            <h2 class="section-title">Traş Galerisi</h2>
            <div class="gallery-section">
                <div class="upload-box">
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="uploadImage(event)">
                    <button class="btn btn-primary" onclick="document.getElementById('imageUpload').click()">
                        📸 Fotoğraf Ekle
                    </button>
                    <p style="color: var(--text-secondary); margin-top: 10px; font-size: 0.9rem;">
                        Yaptığınız traşların fotoğraflarını ekleyin
                    </p>
                </div>
                <div class="gallery-grid" id="galleryGrid">
                    <!-- Dynamic gallery items -->
                </div>
            </div>

            <!-- Table -->
            <div class="table-container" style="margin-top: 60px;">
                <table>
                    <thead>
                        <tr>
                            <th>Tarih</th>
                            <th>Saat</th>
                            <th>Müşteri</th>
                            <th>Telefon</th>
                            <th>Hizmet</th>
                            <th>Durum</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsTable">
                        <!-- Dynamic content -->
                    </tbody>
                </table>
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-state-icon">📅</div>
                    <h3>Henüz randevu yok</h3>
                    <p>Randevular burada görünecek</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Admin credentials - ÖNEMLİ: Gerçek uygulamada backend'de kontrol edilmeli!
        const ADMIN_USERNAME = 'kubi';
        const ADMIN_PASSWORD = 'kubi123';

        let appointments = [];
        let currentFilter = 'all';
        let gallery = [];

        function login(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').classList.add('active');
                loadAppointments();
                loadGallery();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function loadGallery() {
            gallery = JSON.parse(localStorage.getItem('berberKubiGallery')) || [];
            renderGallery();
        }

        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            
            if (gallery.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px;">Henüz fotoğraf eklenmedi</p>';
                return;
            }

            grid.innerHTML = gallery.map((img, index) => `
                <div class="gallery-item">
                    <img src="${img.url}" alt="Traş ${index + 1}">
                    <div class="gallery-item-actions">
                        <button class="gallery-btn gallery-btn-delete" onclick="deleteImage(${index})" title="Sil">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function uploadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                gallery.push({
                    id: Date.now(),
                    url: e.target.result,
                    uploadedAt: new Date().toISOString()
                });
                localStorage.setItem('berberKubiGallery', JSON.stringify(gallery));
                renderGallery();
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function deleteImage(index) {
            if (confirm('Bu fotoğrafı silmek istediğinizden emin misiniz?')) {
                gallery.splice(index, 1);
                localStorage.setItem('berberKubiGallery', JSON.stringify(gallery));
                renderGallery();
            }
        }

        function logout() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminContent').classList.remove('active');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function loadAppointments() {
            appointments = JSON.parse(localStorage.getItem('berberKubiAppointments')) || [];
            updateStats();
            renderAppointments();
        }

        function updateStats() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - today.getDay() + 1);
            
            const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);

            document.getElementById('todayCount').textContent = 
                appointments.filter(a => a.date === todayStr).length;

            document.getElementById('weekCount').textContent = 
                appointments.filter(a => new Date(a.date) >= weekStart).length;

            document.getElementById('monthCount').textContent = 
                appointments.filter(a => new Date(a.date) >= monthStart).length;

            document.getElementById('totalCount').textContent = appointments.length;
        }

        function filterAppointments(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderAppointments();
        }

        function renderAppointments() {
            const tbody = document.getElementById('appointmentsTable');
            const emptyState = document.getElementById('emptyState');
            
            let filtered = [...appointments];
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            if (currentFilter === 'today') {
                filtered = filtered.filter(a => a.date === todayStr);
            } else if (currentFilter === 'upcoming') {
                filtered = filtered.filter(a => new Date(a.date) >= today);
            } else if (currentFilter === 'pending') {
                filtered = filtered.filter(a => a.status === 'pending');
            } else if (currentFilter === 'confirmed') {
                filtered = filtered.filter(a => a.status === 'confirmed');
            }

            filtered.sort((a, b) => {
                const dateA = new Date(a.date + ' ' + a.time);
                const dateB = new Date(b.date + ' ' + b.time);
                return dateA - dateB;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            tbody.innerHTML = filtered.map(apt => {
                const [y, m, d] = apt.date.split('-');
                const statusClass = apt.status === 'pending' ? 'status-pending' : 
                                  apt.status === 'confirmed' ? 'status-confirmed' : 'status-cancelled';
                const statusText = apt.status === 'pending' ? 'Bekliyor' : 
                                 apt.status === 'confirmed' ? 'Onaylandı' : 'İptal';

                return `
                    <tr>
                        <td>${d}.${m}.${y}</td>
                        <td><strong>${apt.time}</strong></td>
                        <td>${apt.firstName} ${apt.lastName}</td>
                        <td>${apt.phone}</td>
                        <td>${apt.service}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <div class="action-btns">
                                ${apt.status === 'pending' ? 
                                    `<button class="action-btn btn-confirm" onclick="confirmAppointment(${apt.id})">✓ Onayla</button>` : ''}
                                <button class="action-btn btn-call" onclick="callCustomer('${apt.phone}')">📞 Ara</button>
                                <button class="action-btn btn-cancel" onclick="cancelAppointment(${apt.id})">✕ İptal</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function confirmAppointment(id) {
            const apt = appointments.find(a => a.id === id);
            if (apt) {
                apt.status = 'confirmed';
                localStorage.setItem('berberKubiAppointments', JSON.stringify(appointments));
                loadAppointments();
            }
        }

        function callCustomer(phone) {
            if (confirm(`${phone} numarasını aramak için telefon uygulamanız açılacak.`)) {
                window.location.href = `tel:${phone}`;
            }
        }

        function cancelAppointment(id) {
            if (confirm('Bu randevuyu iptal etmek istediğinizden emin misiniz?')) {
                appointments = appointments.filter(a => a.id !== id);
                localStorage.setItem('berberKubiAppointments', JSON.stringify(appointments));
                loadAppointments();
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(loadAppointments, 30000);
    </script>
</body>
</html>
